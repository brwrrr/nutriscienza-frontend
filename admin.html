<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NutriScienza — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #2D5F3F; --green-dark: #1A2E22; --green-tint: #E8F0EB;
      --gold: #C9A66B; --cream: #FBF9F4; --text: #2A2A2A;
      --muted: #6B6B6B; --border: #E5E0D3; --red: #C44444; --orange: #D97706;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }

    /* ── Login ── */
    #login-screen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: white; border: 1px solid var(--border); border-radius: 16px;
      padding: 40px; width: 360px; text-align: center;
    }
    .login-card h1 { font-size: 22px; color: var(--green); margin-bottom: 6px; }
    .login-card p { font-size: 14px; color: var(--muted); margin-bottom: 24px; }
    .login-card input {
      width: 100%; padding: 11px 14px; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: 15px; margin-bottom: 14px;
    }
    .login-card input:focus { outline: none; border-color: var(--green); }
    .btn { background: var(--green); color: white; padding: 12px 20px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; }
    .btn:hover { opacity: .88; }
    .btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 6px; cursor: pointer; border: none; font-weight: 600; }
    .btn-retry { background: var(--orange); color: white; }
    .btn-retry:hover { opacity: .88; }
    #login-error { font-size: 13px; color: var(--red); margin-top: 8px; }

    /* ── Layout ── */
    #app { display: none; }
    header { background: var(--green-dark); padding: 14px 24px; display: flex; align-items: center; gap: 16px; }
    header .logo { font-size: 18px; font-weight: 700; color: white; letter-spacing: -.5px; }
    header .logo span { color: var(--gold); }
    header .badge { background: rgba(255,255,255,.12); color: rgba(255,255,255,.8); padding: 3px 10px; border-radius: 20px; font-size: 12px; }
    header .logout { margin-left: auto; color: rgba(255,255,255,.7); cursor: pointer; font-size: 13px; background: none; border: none; }

    .container { max-width: 1200px; margin: 0 auto; padding: 28px 24px; }

    /* ── Stats ── */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 28px; }
    .stat-card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; }
    .stat-card .label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); font-weight: 700; margin-bottom: 6px; }
    .stat-card .value { font-size: 28px; font-weight: 700; color: var(--green); }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
    .tab { padding: 10px 18px; font-size: 14px; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; background: none; border-top: none; border-left: none; border-right: none; }
    .tab.active { color: var(--green); border-bottom-color: var(--green); }

    /* ── Table ── */
    .table-wrap { background: white; border: 1px solid var(--border); border-radius: 12px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: var(--cream); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); font-weight: 700; padding: 10px 14px; text-align: left; white-space: nowrap; }
    td { padding: 11px 14px; border-top: 1px solid var(--border); vertical-align: middle; }
    tr:hover td { background: #FAFAFA; }

    /* Status badge */
    .badge-status { padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .s-sent      { background: #D1FAE5; color: #065F46; }
    .s-generating{ background: #FEF3C7; color: #92400E; }
    .s-paid      { background: #DBEAFE; color: #1E40AF; }
    .s-failed    { background: #FEE2E2; color: #991B1B; }
    .s-active    { background: #D1FAE5; color: #065F46; }
    .s-cancelled { background: #F3F4F6; color: #6B7280; }
    .s-past_due  { background: #FEE2E2; color: #991B1B; }
    .s-pending_payment { background: #F3F4F6; color: #6B7280; }

    .empty { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }
    .refresh-btn { background: var(--green-tint); color: var(--green); border: none; padding: 7px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; margin-bottom: 16px; }
    .refresh-btn:hover { opacity: .8; }
    .panel { display: none; }
    .panel.active { display: block; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <h1>NutriScienza</h1>
    <p>Pannello amministrativo</p>
    <input type="password" id="api-key-input" placeholder="API Key admin" autocomplete="current-password">
    <button class="btn" onclick="doLogin()">Accedi</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="logo">Nutri<span>Scienza</span></div>
    <div class="badge">Admin</div>
    <button class="logout" onclick="logout()">Esci</button>
  </header>

  <div class="container">
    <!-- Stats -->
    <div class="stats" id="stats-grid">
      <div class="stat-card"><div class="label">Ordini totali</div><div class="value" id="stat-total">—</div></div>
      <div class="stat-card"><div class="label">Inviati</div><div class="value" id="stat-sent" style="color:#065F46;">—</div></div>
      <div class="stat-card"><div class="label">Falliti</div><div class="value" id="stat-failed" style="color:var(--red);">—</div></div>
      <div class="stat-card"><div class="label">Subscriber attivi</div><div class="value" id="stat-subscribers">—</div></div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('orders', this)">Ordini</button>
      <button class="tab" onclick="switchTab('subscribers', this)">Subscriber</button>
    </div>

    <!-- Ordini -->
    <div id="panel-orders" class="panel active">
      <button class="refresh-btn" onclick="loadOrders()">↻ Aggiorna</button>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID Ordine</th><th>Piano</th><th>Email</th>
              <th>Stato</th><th>Creato</th><th>Aggiornato</th><th>Azioni</th>
            </tr>
          </thead>
          <tbody id="orders-body"><tr><td colspan="7" class="empty">Caricamento…</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- Subscriber -->
    <div id="panel-subscribers" class="panel">
      <button class="refresh-btn" onclick="loadSubscribers()">↻ Aggiorna</button>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Email</th><th>Nome</th><th>Piano</th><th>Stato</th>
              <th>Mese</th><th>Prossimo piano</th><th>Creato</th>
            </tr>
          </thead>
          <tbody id="subs-body"><tr><td colspan="7" class="empty">Caricamento…</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
  // Backend URL — admin.html is served from the frontend static site,
  // but the API lives on a different Render service.
  const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname.startsWith('127.'))
    ? 'http://localhost:8000'
    : 'https://nutriscienza-api.onrender.com';

  let apiKey = sessionStorage.getItem('ns_admin_key') || '';

  function headers() {
    return { 'Authorization': 'Bearer ' + apiKey, 'Content-Type': 'application/json' };
  }

  function doLogin() {
    apiKey = document.getElementById('api-key-input').value.trim();
    fetch(API_BASE + '/api/admin/stats', { headers: headers() })
      .then(function(r) {
        if (!r.ok) throw new Error('401');
        return r.json();
      })
      .then(function(data) {
        sessionStorage.setItem('ns_admin_key', apiKey);
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        applyStats(data);
        loadOrders();
      })
      .catch(function() {
        document.getElementById('login-error').textContent = 'API Key non valida.';
      });
  }

  document.getElementById('api-key-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });

  function logout() {
    sessionStorage.removeItem('ns_admin_key');
    location.reload();
  }

  // Auto-login se key salvata
  if (apiKey) {
    fetch(API_BASE + '/api/admin/stats', { headers: headers() })
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(data) {
        if (!data) { sessionStorage.removeItem('ns_admin_key'); return; }
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        applyStats(data);
        loadOrders();
      });
  }

  function applyStats(data) {
    const byStatus = data.orders_by_status || {};
    const total = Object.values(byStatus).reduce(function(a, b) { return a + b; }, 0);
    document.getElementById('stat-total').textContent  = total;
    document.getElementById('stat-sent').textContent   = byStatus['sent'] || 0;
    document.getElementById('stat-failed').textContent = byStatus['failed'] || 0;
  }

  function badgeClass(status) {
    const map = { sent: 's-sent', generating: 's-generating', paid: 's-paid', failed: 's-failed',
                  active: 's-active', cancelled: 's-cancelled', past_due: 's-past_due',
                  pending_payment: 's-pending_payment' };
    return map[status] || '';
  }

  function fmtDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleString('it-IT', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
  }

  function loadOrders() {
    fetch(API_BASE + '/api/admin/orders?limit=200', { headers: headers() })
      .then(function(r) { return r.json(); })
      .then(function(rows) {
        if (!Array.isArray(rows)) { document.getElementById('orders-body').innerHTML = '<tr><td colspan="7" class="empty">Errore caricamento.</td></tr>'; return; }
        if (rows.length === 0) { document.getElementById('orders-body').innerHTML = '<tr><td colspan="7" class="empty">Nessun ordine trovato.</td></tr>'; return; }
        const html = rows.map(function(o) {
          const canRetry = ['failed','paid','generating'].includes(o.status);
          const retryBtn = canRetry
            ? '<button class="btn-sm btn-retry" onclick="retryOrder(\'' + o.id + '\')">↻ Retry</button>'
            : '';
          return '<tr>'
            + '<td style="font-family:monospace;font-size:11px;">' + o.id + '</td>'
            + '<td><strong>' + o.plan_chosen + '</strong></td>'
            + '<td>' + o.email + '</td>'
            + '<td><span class="badge-status ' + badgeClass(o.status) + '">' + o.status + '</span></td>'
            + '<td style="white-space:nowrap;">' + fmtDate(o.created_at) + '</td>'
            + '<td style="white-space:nowrap;">' + fmtDate(o.updated_at) + '</td>'
            + '<td>' + retryBtn + '</td>'
            + '</tr>';
        }).join('');
        document.getElementById('orders-body').innerHTML = html;
      })
      .catch(function() {
        document.getElementById('orders-body').innerHTML = '<tr><td colspan="7" class="empty">Errore di rete.</td></tr>';
      });
  }

  function retryOrder(orderId) {
    if (!confirm('Riprocessare ordine ' + orderId + '?')) return;
    fetch(API_BASE + '/api/admin/orders/' + orderId + '/retry', { method: 'POST', headers: headers() })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.queued) { alert('Pipeline riavviata. Ricarica tra qualche minuto.'); loadOrders(); }
        else { alert('Errore: ' + (data.detail || JSON.stringify(data))); }
      });
  }

  function loadSubscribers() {
    fetch(API_BASE + '/api/admin/subscribers', { headers: headers() })
      .then(function(r) { return r.json(); })
      .then(function(rows) {
        if (!Array.isArray(rows)) { document.getElementById('subs-body').innerHTML = '<tr><td colspan="7" class="empty">Errore.</td></tr>'; return; }
        if (rows.length === 0) { document.getElementById('subs-body').innerHTML = '<tr><td colspan="7" class="empty">Nessun subscriber.</td></tr>'; return; }
        // update stat
        const active = rows.filter(function(r) { return r.subscription_status === 'active'; }).length;
        document.getElementById('stat-subscribers').textContent = active;
        const html = rows.map(function(s) {
          return '<tr>'
            + '<td>' + s.email + '</td>'
            + '<td>' + s.first_name + '</td>'
            + '<td><strong>' + s.plan + '</strong></td>'
            + '<td><span class="badge-status ' + badgeClass(s.subscription_status) + '">' + s.subscription_status + '</span></td>'
            + '<td style="text-align:center;">' + s.plan_month + '</td>'
            + '<td style="white-space:nowrap;">' + fmtDate(s.next_plan_due_at) + '</td>'
            + '<td style="white-space:nowrap;">' + fmtDate(s.created_at) + '</td>'
            + '</tr>';
        }).join('');
        document.getElementById('subs-body').innerHTML = html;
      });
  }

  function switchTab(name, el) {
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
    el.classList.add('active');
    document.getElementById('panel-' + name).classList.add('active');
    if (name === 'orders') loadOrders();
    if (name === 'subscribers') loadSubscribers();
  }
</script>
</body>
</html>
